# ============================================================================
run.empty_command:
  en: "scoop run requires a command to execute"
  ko: "scoop run은 실행할 명령이 필요해요"
  pt-BR: "scoop run requer um comando para executar"
  ja: "scoop run には実行するコマンドが必要です"

