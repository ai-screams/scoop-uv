# scoop i18n translations
# Format: rust-i18n Version 2
_version: 2

# ============================================================================
# Lang command
# ============================================================================
lang.current:
  en: "Current: %{lang} (%{name})"
  ko: "현재: %{lang} (%{name})"
  pt-BR: "Atual: %{lang} (%{name})"
  ja: "現在: %{lang} (%{name})"

lang.set:
  en: "Language set to %{lang}"
  ko: "언어가 %{lang}(으)로 설정됨"
  pt-BR: "Idioma definido para %{lang}"
  ja: "%{lang} に設定しました"

lang.reset:
  en: "Reset to system default: %{lang}"
  ko: "시스템 기본으로 리셋됨: %{lang}"
  pt-BR: "Redefinido para o padrão do sistema: %{lang}"
  ja: "システムデフォルトにリセットしました: %{lang}"

lang.unsupported:
  en: "Unsupported language: %{lang}"
  ko: "지원하지 않는 언어: %{lang}"
  pt-BR: "Idioma não suportado: %{lang}"
  ja: "サポートされていない言語: %{lang}"

lang.list_header:
  en: "Supported languages:"
  ko: "지원 언어:"
  pt-BR: "Idiomas suportados:"
  ja: "対応言語:"

lang.hint:
  en: "Run 'scoop lang --list' to see supported languages"
  ko: "'scoop lang --list'로 지원 언어 확인"
  pt-BR: "Execute 'scoop lang --list' para ver os idiomas suportados"
  ja: "'scoop lang --list' を実行するとサポートされている言語を確認できます"

# ============================================================================
# Create command
# ============================================================================
create.removing_existing:
  en: "Removing existing '%{name}'..."
  ko: "기존 '%{name}' 삭제 중..."
  pt-BR: "Removendo '%{name}' existente..."
  ja: "既存の '%{name}' を削除中..."

create.creating:
  en: "Creating '%{name}' (Python %{python})..."
  ko: "'%{name}' 생성 중 (Python %{python})..."
  pt-BR: "Criando '%{name}' (Python %{python})..."
  ja: "'%{name}' を作成中 (Python %{python})..."

create.success:
  en: "Created '%{name}' environment"
  ko: "'%{name}' 환경 생성됨"
  pt-BR: "Ambiente '%{name}' criado"
  ja: "'%{name}' 環境を作成しました"

create.path:
  en: "  Path: %{path}"
  ko: "  경로: %{path}"
  pt-BR: "  Caminho: %{path}"
  ja: "  パス: %{path}"

create.activate_hint:
  en: "  Activate: scoop use %{name}"
  ko: "  활성화: scoop use %{name}"
  pt-BR: "  Ativar: scoop use %{name}"
  ja: "  有効化: scoop use %{name}"

create.creating_with_path:
  en: "Creating '%{name}' (Python: %{path})..."
  ko: "'%{name}' 생성 중 (Python: %{path})..."
  pt-BR: "Criando '%{name}' (Python: %{path})..."
  ja: "'%{name}' を作成中 (Python: %{path})..."

create.installing_python:
  en: "Python %{version} is not installed — installing now..."
  ko: "Python %{version}이(가) 설치되어 있지 않아 설치합니다..."
  pt-BR: "Python %{version} não está instalado — instalando agora..."
  ja: "Python %{version} は未インストール — 今インストールします..."

# ============================================================================
# Clone command
# ============================================================================
clone.cloning:
  en: "Cloning '%{src}' → '%{dst}' (Python %{python})..."
  ko: "'%{src}' → '%{dst}' 복제 중 (Python %{python})..."
  pt-BR: "Clonando '%{src}' → '%{dst}' (Python %{python})..."
  ja: "'%{src}' → '%{dst}' を複製中 (Python %{python})..."

clone.copying_packages:
  en: "Copying %{count} packages..."
  ko: "패키지 %{count}개 복사 중..."
  pt-BR: "Copiando %{count} pacotes..."
  ja: "パッケージ %{count} 個をコピー中..."

clone.no_packages_skipped:
  en: "Package copy skipped (--no-packages)"
  ko: "패키지 복사를 건너뜀 (--no-packages)"
  pt-BR: "Cópia de pacotes ignorada (--no-packages)"
  ja: "パッケージのコピーをスキップ (--no-packages)"

clone.success:
  en: "Cloned '%{src}' → '%{dst}'"
  ko: "'%{src}' → '%{dst}' 복제 완료"
  pt-BR: "'%{src}' → '%{dst}' clonado"
  ja: "'%{src}' → '%{dst}' を複製しました"

clone.self_clone_error:
  en: "Source and destination must differ"
  ko: "원본과 대상이 같을 수 없어요"
  pt-BR: "Origem e destino devem ser diferentes"
  ja: "コピー元とコピー先が同じです"

# ============================================================================
# Export / Import commands
# ============================================================================
export.written:
  en: "Exported '%{name}' to %{path}"
  ko: "'%{name}'을(를) %{path}에 내보냄"
  pt-BR: "'%{name}' exportado para %{path}"
  ja: "'%{name}' を %{path} にエクスポートしました"

import.creating:
  en: "Importing into '%{name}' (Python %{python})..."
  ko: "'%{name}'(으)로 가져오는 중 (Python %{python})..."
  pt-BR: "Importando para '%{name}' (Python %{python})..."
  ja: "'%{name}' へインポート中 (Python %{python})..."

import.installing:
  en: "Installing %{count} packages from export..."
  ko: "내보낸 파일에서 패키지 %{count}개 설치 중..."
  pt-BR: "Instalando %{count} pacotes do export..."
  ja: "エクスポートから %{count} 個のパッケージをインストール中..."

import.success:
  en: "Imported '%{name}' with %{count} packages"
  ko: "'%{name}'을(를) 패키지 %{count}개와 함께 가져왔어요"
  pt-BR: "'%{name}' importado com %{count} pacotes"
  ja: "'%{name}' を %{count} 個のパッケージとともにインポートしました"

error.invalid_export_file:
  en: "Invalid export file '%{path}': %{reason}"
  ko: "잘못된 내보내기 파일 '%{path}': %{reason}"
  pt-BR: "Arquivo de exportação inválido '%{path}': %{reason}"
  ja: "無効なエクスポートファイル '%{path}': %{reason}"

error.unsupported_export_version:
  en: "Export file version '%{version}' is not supported (this binary speaks '%{supported}')"
  ko: "내보내기 파일 버전 '%{version}'은(는) 지원되지 않아요 (이 바이너리는 '%{supported}' 사용)"
  pt-BR: "Versão '%{version}' do arquivo de exportação não é suportada (este binário usa '%{supported}')"
  ja: "エクスポートファイルのバージョン '%{version}' は未対応です (このバイナリは '%{supported}')"

suggestion.unsupported_export_version:
  en: "→ Upgrade scoop to a build that supports version '%{supported}' or higher, or re-export from a compatible source"
  ko: "→ '%{supported}' 이상을 지원하는 scoop으로 업그레이드하거나 호환 가능한 환경에서 다시 내보내세요"
  pt-BR: "→ Atualize o scoop para uma versão que suporte '%{supported}' ou superior, ou re-exporte de uma fonte compatível"
  ja: "→ '%{supported}' 以降に対応する scoop にアップグレードするか、互換性のある環境から再エクスポートしてください"

# ============================================================================
# Sync command (.scoop.toml)
# ============================================================================
sync.creating_env:
  en: "Creating '%{name}' (Python %{python}) per .scoop.toml..."
  ko: ".scoop.toml에 따라 '%{name}' 생성 중 (Python %{python})..."
  pt-BR: "Criando '%{name}' (Python %{python}) conforme .scoop.toml..."
  ja: ".scoop.toml に従って '%{name}' を作成中 (Python %{python})..."

sync.installing:
  en: "Installing %{count} packages..."
  ko: "패키지 %{count}개 설치 중..."
  pt-BR: "Instalando %{count} pacotes..."
  ja: "パッケージ %{count} 個をインストール中..."

sync.up_to_date:
  en: "Nothing to install (no packages in the resolved groups)"
  ko: "설치할 항목 없음 (선택된 그룹에 패키지 없음)"
  pt-BR: "Nada a instalar (sem pacotes nos grupos selecionados)"
  ja: "インストールするものはありません (選択されたグループにパッケージなし)"

sync.success:
  en: "Synced %{count} packages into '%{name}'"
  ko: "'%{name}'에 패키지 %{count}개 동기화 완료"
  pt-BR: "%{count} pacotes sincronizados em '%{name}'"
  ja: "'%{name}' に %{count} 個のパッケージを同期しました"

sync.dry_run_header:
  en: "Dry-run plan:"
  ko: "Dry-run 계획:"
  pt-BR: "Plano dry-run:"
  ja: "Dry-run 計画:"

sync.python_mismatch_warn:
  en: "'%{name}' uses Python %{actual} but .scoop.toml asks for %{wanted} — syncing packages anyway"
  ko: "'%{name}'은 Python %{actual} 사용 중이지만 .scoop.toml은 %{wanted} 요청 — 패키지 동기화는 계속 진행"
  pt-BR: "'%{name}' usa Python %{actual} mas .scoop.toml pede %{wanted} — sincronizando pacotes mesmo assim"
  ja: "'%{name}' は Python %{actual} を使用していますが .scoop.toml は %{wanted} を要求 — パッケージ同期は続行"

sync.unknown_group_error:
  en: "Group '%{group}' is not defined in .scoop.toml (available: %{groups})"
  ko: "'%{group}' 그룹이 .scoop.toml에 정의되어 있지 않음 (사용 가능: %{groups})"
  pt-BR: "Grupo '%{group}' não está definido em .scoop.toml (disponíveis: %{groups})"
  ja: ".scoop.toml にグループ '%{group}' が定義されていません (利用可能: %{groups})"

error.manifest_not_found:
  en: "No .scoop.toml found in '%{path}' or any parent directory"
  ko: "'%{path}' 또는 상위 디렉터리 어디에도 .scoop.toml이 없어요"
  pt-BR: "Nenhum .scoop.toml encontrado em '%{path}' ou nos diretórios pai"
  ja: "'%{path}' またはその上位ディレクトリに .scoop.toml が見つかりません"

suggestion.manifest_not_found:
  en: "→ Create one at the project root (see https://ai-screams.github.io/scoop-uv/commands/sync.html)"
  ko: "→ 프로젝트 루트에 만들어 주세요 (https://ai-screams.github.io/scoop-uv/commands/sync.html 참고)"
  pt-BR: "→ Crie um na raiz do projeto (veja https://ai-screams.github.io/scoop-uv/commands/sync.html)"
  ja: "→ プロジェクトルートに作成してください (https://ai-screams.github.io/scoop-uv/commands/sync.html 参照)"

# ============================================================================
