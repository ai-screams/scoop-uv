  ko: "경로: %{path}"
  pt-BR: "Caminho: %{path}"
  ja: "パス: %{path}"

remove.confirm:
  en: "Remove '%{name}'?"
  ko: "'%{name}' 삭제?"
  pt-BR: "Remover '%{name}'?"
  ja: "'%{name}' を削除しますか?"

