# cargo-mutants configuration for scoop-uv
# Docs: https://mutants.rs/
#
# Mutation testing verifies the test suite actually catches bugs (not just that
# lines execute). We exclude code where a "missed" mutant is an acceptable gap
# rather than a real test hole:
#   - shell/**     : emits shell-script strings, validated at the integration level
#   - cli/**       : thin handlers that shell out to `uv` (no uv on CI runners)
#   - output/**    : terminal formatting and spinners (cosmetic)
#   - i18n.rs      : locale glue
#   - main.rs      : process entry / arg wiring
#   - test_utils.rs: test-only helpers
exclude_globs = [
    "src/shell/**",
    "src/cli/**",
    "src/output/**",
    "src/i18n.rs",
    "src/main.rs",
    "src/test_utils.rs",
]

# These UvClient methods only spawn `uv` and forward the result; the logic they
# wrap (parsing, version matching, error mapping) lives in run_uv /
# parse_python_list_json / PythonVersion and IS mutation-tested. Their own
# success path is exercised only by #[ignore]d integration tests (need a real
# uv + network), so unit-level mutation can't kill "return Ok(...)" mutants —
# an acceptable gap, not a test hole.
exclude_re = [
    "UvClient::version",
    "UvClient::create_venv",
    "UvClient::install_python",
    "UvClient::run_python_list",
    "UvClient::uninstall_python",
    "UvClient::pip_install",
    "UvClient::cache_prune",
    # Spawns the interpreter; its parsing logic is covered via the pure
    # parse_python_version_output (this wrapper can't be unit-mutation-tested
    # without a real exec, which is container-flaky).
    "detect_python_version",
    # Thin pass-throughs to UvClient::find_python / install_python / pip_install.
    # The wrapped uv calls are already excluded above; mutating these wrappers
    # only flips behavior in code paths that need a real uv invocation to
    # observe.
    "VirtualenvService::is_python_installed",
    "VirtualenvService::install_python",
    "VirtualenvService::pip_install",
    # create / create_with_python_path / create_inner all shell out to
    # `uv venv` via UvClient::create_venv (already excluded above).
    # Without uv on the runner the success-path `Ok(Default::default())`
    # mutations can't be killed by unit tests — every test that would
    # observe a real returned PathBuf needs an actual uv subprocess.
    # Integration tests under tests/cli.rs cover create end-to-end but
    # are `#[ignore]`d on CI runners that lack uv. Same exclusion
    # rationale as UvClient::create_venv.
    "VirtualenvService::create",
    "VirtualenvService::create_with_python_path",
    "VirtualenvService::create_inner",
    # Shells out to the venv's own pip and graceful-degrades on parse failure;
    # the meaningful coverage is provided by the two list_installed_packages
    # tests in core::tests. Mutating the wrapper body can only flip behaviour
    # in paths that need a real pip invocation to observe.
    "list_installed_packages",
    # Excluded specifically for the `delete !` mutation on the pop guard,
    # which inverts the termination condition and makes the function loop
    # forever. cargo-mutants reports the result as TIMEOUT (exit 3), failing
    # CI even though no behaviour-flip mutation actually goes uncaught.
    # The function is 8 lines and obviously correct by inspection; the
    # return-value mutations are still covered by the find_manifest_*
    # tests via the call sites in ScoopManifest::parse and scoop sync.
    "find_manifest",
    # `cfg(windows)` branch of the cross-platform extension probe. On non-
    # Windows hosts the variant doesn't compile, so its mutations can't be
    # tested locally; on Windows hosts the existing rstest cases cover it.
    "executable_candidates",
]

# `cargo test` runs in well under a second; give each mutant generous headroom
# so a slow machine doesn't report false timeouts.
timeout_multiplier = 8.0
minimum_test_timeout = 30
