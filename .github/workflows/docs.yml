# Documentation Deployment
# Deploys mdBook to GitHub Pages on release tags.
#
# Both English (default) and Korean locales are built. English lives
# at the site root (legacy URL contract preserved); Korean lives at
# `/ko/` as a sibling subdir. Translation memory is in `docs/po/`
# managed by mdbook-i18n-helpers (gettext-based, English fallback).

name: Documentation

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v0.2.10, v1.0.0, etc.)
  workflow_dispatch:  # Allow manual trigger

# Sets permissions for GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.5.3"
  MDBOOK_I18N_HELPERS_VERSION: "0.4.0"

jobs:
  # ====================
  # Build Documentation
  # ====================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15  # mdBook + i18n-helpers compile + dual-locale build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install gettext
        run: sudo apt-get install -y gettext

      # mdbook-i18n-helpers 0.4.0 (depends on mdbook-core 0.5) needs
      # rustc 1.88+ to build. The project's rust-toolchain.toml pins
      # 1.85 (MSRV); we install stable explicitly here and run the
      # `cargo install` from a directory outside the repo so the
      # project's toolchain pin doesn't override it.
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdbook-i18n-helpers
        working-directory: ${{ runner.temp }}
        run: cargo install mdbook-i18n-helpers --version "$MDBOOK_I18N_HELPERS_VERSION" --locked

      - name: Install mdBook
        run: |
          mkdir -p bin
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz --directory=bin
          echo "$PWD/bin" >> $GITHUB_PATH

      # Stale-PO guard: regenerate the pot template from current
      # English source and msgmerge it into ko.po. If the resulting
      # ko.po differs from what's committed, source-level edits
      # without translation updates have crept in — fail the build.
      #
      # msgmerge rewrites two header lines (POT-Creation-Date and
      # PO-Revision-Date) to "now" on every run, which would trip
      # `git diff --exit-code` even when translations are in sync.
      # Restore the original values after the merge so the diff only
      # surfaces real semantic changes.
      - name: Verify ko translations are in sync
        working-directory: docs
        run: |
          MDBOOK_OUTPUT='{"xgettext": {}}' mdbook build -d po
          cp po/ko.po /tmp/orig-ko.po
          msgmerge --update --backup=none po/ko.po po/messages.pot
          # Restore the two timestamp headers so `git diff --exit-code`
          # below only catches semantic changes. msgmerge rewrites both
          # to "now" every run, which would otherwise turn this guard
          # into a permanent CI failure (volatile timestamps != stale
          # translations).
          python3 - <<'PYEOF'
          import re
          ORIG = '/tmp/orig-ko.po'
          NEW = 'po/ko.po'
          orig = open(ORIG, encoding='utf-8').read()
          new = open(NEW, encoding='utf-8').read()
          for key in ('POT-Creation-Date', 'PO-Revision-Date'):
              pattern = r'^"' + key + r':.*$'
              m = re.search(pattern, orig, flags=re.M)
              if m:
                  new = re.sub(pattern, lambda _: m.group(0), new, count=1, flags=re.M)
          open(NEW, 'w', encoding='utf-8').write(new)
          PYEOF
          if ! git diff --exit-code po/ko.po; then
            echo '::error::docs/po/ko.po is out of date. Re-run `cd docs && MDBOOK_OUTPUT='\''{"xgettext": {}}'\'' mdbook build -d po && msgmerge --update --backup=none po/ko.po po/messages.pot` and commit the result.'
            exit 1
          fi

      - name: Build English (root)
        working-directory: docs
        run: mdbook build -d book

      - name: Build Korean (book/ko)
        working-directory: docs
        env:
          MDBOOK_BOOK__LANGUAGE: ko
        run: mdbook build -d book/ko

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/book

  # ====================
  # Deploy to GitHub Pages
  # ====================
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5  # GitHub Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
